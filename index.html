<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Number Rush • Main Menu</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #1a4d5e 0%, #0e3f4f 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 500px; width: 100%; }
        .card {
            background: white;
            border-radius: 40px;
            padding: 40px 28px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        h1 {
            font-size: 2.8rem;
            font-weight: 800;
            color: #1a4d5e;
            margin-bottom: 8px;
        }
        .sub {
            color: #6b8f9c;
            font-size: 0.9rem;
            margin-bottom: 32px;
        }
        .btn {
            display: block;
            width: 100%;
            border: none;
            border-radius: 60px;
            padding: 16px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 16px;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .btn:active { transform: scale(0.98); }
        .btn-solo { background: #2c6b7c; color: white; box-shadow: 0 4px 0 #15424f; }
        .btn-pvp { background: #e67e22; color: white; box-shadow: 0 4px 0 #b45f1b; }
        .btn-leaderboard { background: #e9ecef; color: #2c6b7c; box-shadow: 0 2px 0 #cbd5e0; margin-bottom: 0; }
        .leaderboard-panel {
            background: white;
            border-radius: 32px;
            margin-top: 20px;
            overflow: hidden;
            display: none;
        }
        .leaderboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: #f8f9fc;
            border-bottom: 1px solid #eef2f5;
        }
        .leaderboard-header h3 { font-size: 1.1rem; color: #1a4d5e; }
        .close-btn { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #8ba0aa; }
        .leaderboard-list { padding: 8px 0; max-height: 350px; overflow-y: auto; }
        .rank-item {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            border-bottom: 1px solid #f0f2f5;
        }
        .rank-number { width: 45px; font-weight: 700; color: #8ba0aa; }
        .rank-name { flex: 1; font-weight: 500; color: #2c5a6e; }
        .rank-score { font-weight: 700; color: #f5a623; }
        .rank-item.top-1 { background: #fff9ef; }
        .rank-item.top-1 .rank-number { color: #f5a623; }
        .empty { text-align: center; padding: 32px; color: #8ba0aa; }
        footer { text-align: center; font-size: 0.7rem; color: rgba(255,255,255,0.5); margin-top: 20px; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>⚡ NUMBER RUSH</h1>
        <div class="sub">Mental Math • Solo or Duel</div>
        
        <button class="btn btn-solo" id="soloBtn">🎮 SOLO MODE</button>
        <button class="btn btn-pvp" id="pvpBtn">⚔️ PVP MODE</button>
        <button class="btn btn-leaderboard" id="leaderboardBtn">🏆 LEADERBOARD</button>
    </div>
    
    <div id="leaderboardPanel" class="leaderboard-panel">
        <div class="leaderboard-header">
            <h3>🏆 LEADERBOARD</h3>
            <button class="close-btn" id="closeLeaderboardBtn">✕</button>
        </div>
        <div id="leaderboardList" class="leaderboard-list"><div class="empty">Loading...</div></div>
    </div>
    <footer>⚡ Correct answer = 10 points | 30 seconds time</footer>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA6iOEmuLeLKdNidLgEqISGSW2XWRHLhjQ",
        authDomain: "mathnumberrush.firebaseapp.com",
        databaseURL: "https://mathnumberrush-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "mathnumberrush",
        storageBucket: "mathnumberrush.firebasestorage.app",
        messagingSenderId: "1072751880887",
        appId: "1:1072751880887:web:b9ab1a74c6f40a6620bb32"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    function loadLeaderboard() {
        db.ref('scores').orderByChild('score').limitToLast(10).once('value', (snap) => {
            const scores = [];
            snap.forEach(s => { const v = s.val(); if(v?.name) scores.push({ name: v.name, score: v.score }); });
            scores.sort((a,b) => b.score - a.score);
            const container = document.getElementById('leaderboardList');
            if(scores.length === 0) {
                container.innerHTML = '<div class="empty">No entries yet</div>';
                return;
            }
            let html = '';
            scores.forEach((e,i) => {
                html += `<div class="rank-item ${i===0?'top-1':''}"><div class="rank-number">${i+1}.</div><div class="rank-name">${escapeHtml(e.name)}</div><div class="rank-score">${e.score}</div></div>`;
            });
            container.innerHTML = html;
        });
    }
    function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
    
    document.getElementById('soloBtn').onclick = () => window.location.href = 'solo.html';
    document.getElementById('pvpBtn').onclick = () => window.location.href = 'pvp.html';
    document.getElementById('leaderboardBtn').onclick = () => { loadLeaderboard(); document.getElementById('leaderboardPanel').style.display = 'block'; };
    document.getElementById('closeLeaderboardBtn').onclick = () => document.getElementById('leaderboardPanel').style.display = 'none';
    loadLeaderboard();
</script>
</body>
</html>
