<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <meta name="description" content="Number Rush - a fun and challenging number game">\n    <meta name="keywords" content="number game, fun, challenge, rankings">\n    <meta name="author" content="lzhenweiDev">\n    <link rel="stylesheet" href="styles.css">\n    <title>Number Rush</title>\n    <style>\n        :root {\n            --primary-color: #4CAF50;\n            --secondary-color: #8BC34A;\n            --background-gradient: linear-gradient(to right, #43C6AC, #F8FFAE);\n            --text-color: #333;\n            --button-border-radius: 8px;\n            --font-family: 'Arial', sans-serif;\n        }\n        body {\n            font-family: var(--font-family);\n            background: var(--background-gradient);\n            color: var(--text-color);\n            margin: 0;\n            padding: 20px;\n        }\n        h1 {\n            text-align: center;\n            margin-bottom: 20px;\n        }\n        .button {\n            background-color: var(--primary-color);\n            border: none;\n            color: white;\n            padding: 15px 30px;\n            text-align: center;\n            text-decoration: none;\n            display: inline-block;\n            font-size: 16px;\n            border-radius: var(--button-border-radius);\n            transition: background-color 0.3s;\n        }\n        .button:hover {\n            background-color: var(--secondary-color);\n        }\n        .leaderboard {\n            margin-top: 20px;\n            background: rgba(255, 255, 255, 0.8);\n            padding: 10px;\n            border-radius: var(--button-border-radius);\n        }\n        .medal {\n            display: inline-block;\n            margin: 10px;\n        }\n    </style>\n</head>\n<body>\n    <h1>Welcome to Number Rush</h1>\n    <div class="leaderboard">\n        <h2>Leaderboard</h2>\n        <div class="medal gold">🥇 1st Place: Player 1</div>\n        <div class="medal silver">🥈 2nd Place: Player 2</div>\n        <div class="medal bronze">🥉 3rd Place: Player 3</div>\n    </div>\n    <button class="button">Start Game</button>\n</body>\n</html>
