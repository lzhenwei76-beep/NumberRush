<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Number Rush • Solo-Modus</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f2f3a 0%, #1a4d5e 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 600px; width: 100%; }
        .game-card { background: white; border-radius: 48px; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.35); }
        .stats { background: linear-gradient(135deg, #1e3e4a, #153b46); padding: 24px 28px; display: flex; justify-content: space-between; }
        .stat-box { background: rgba(0,0,0,0.3); border-radius: 60px; padding: 8px 24px; text-align: center; }
        .stat-label { font-size: 0.7rem; text-transform: uppercase; color: #b9dfed; }
        .stat-value { font-size: 2rem; font-weight: 800; color: #ffdd99; }
        .question-area { padding: 40px 28px 28px; background: white; }
        .equation { background: #f8f9fc; border-radius: 48px; padding: 36px 20px; text-align: center; border: 1px solid #eef2f5; }
        .equation-text { font-size: 3.2rem; font-weight: 800; font-family: monospace; color: #2c6b7c; letter-spacing: 4px; }
        .input-area { display: flex; gap: 12px; margin: 24px 0; }
        .answer-input { flex: 1; background: white; border: 2px solid #e2e8f0; border-radius: 60px; font-size: 1.8rem; padding: 16px 24px; text-align: center; font-weight: 600; font-family: monospace; outline: none; }
        .answer-input:focus { border-color: #f5a623; box-shadow: 0 0 0 3px rgba(245,166,35,0.2); }
        .submit-btn { background: #f5a623; border: none; border-radius: 60px; padding: 16px 32px; font-size: 1.2rem; font-weight: 700; color: white; cursor: pointer; box-shadow: 0 5px 0 #b4621a; transform: translateY(-2px); }
        .submit-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #b4621a; }
        .action-buttons { display: flex; gap: 12px; margin-bottom: 20px; }
        .btn-action { flex: 1; background: #e9ecef; border: none; border-radius: 60px; padding: 14px; font-size: 0.9rem; font-weight: 600; color: #4a6f7c; cursor: pointer; }
        .feedback { background: #f8f9fc; border-radius: 40px; padding: 14px 20px; text-align: center; font-size: 0.9rem; color: #5a7e8c; margin-bottom: 16px; }
        .streak-area { display: flex; justify-content: center; gap: 32px; padding: 16px 24px; border-top: 1px solid #eef2f5; background: white; }
        .streak-item { text-align: center; }
        .streak-label { font-size: 0.7rem; color: #8ba0aa; text-transform: uppercase; }
        .streak-value { font-size: 1.5rem; font-weight: 800; color: #f5a623; }
        .modal { display: flex; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; border-radius: 48px; padding: 40px 32px; max-width: 340px; width: 90%; text-align: center; }
        .modal-content h2 { font-size: 2rem; color: #1a4d5e; margin-bottom: 16px; }
        .modal-content p { color: #6b8f9c; margin-bottom: 24px; }
        .ready-buttons { display: flex; gap: 16px; }
        .ready-btn { flex: 1; background: #f5a623; border: none; border-radius: 60px; padding: 14px; font-size: 1.1rem; font-weight: 700; color: white; cursor: pointer; box-shadow: 0 4px 0 #b4621a; transform: translateY(-2px); }
        .ready-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #b4621a; }
        .cancel-btn { background: #e9ecef; color: #2c6b7c; box-shadow: 0 4px 0 #cbd5e0; }
        @keyframes correctFlash { 0% { background: #f8f9fc; } 50% { background: #d4edda; transform: scale(1.01); } 100% { background: #f8f9fc; } }
        @keyframes wrongShake { 0%,100% { transform: translateX(0); background: #f8f9fc; } 25% { transform: translateX(5px); background: #ffe0e0; } 75% { transform: translateX(-5px); background: #ffe0e0; } }
        .correct-animation { animation: correctFlash 0.25s ease; }
        .wrong-animation { animation: wrongShake 0.25s ease; }
        footer { text-align: center; font-size: 0.7rem; color: rgba(255,255,255,0.5); margin-top: 16px; }
    </style>
</head>
<body>
<div class="container">
    <div class="game-card">
        <div class="stats">
            <div class="stat-box"><div class="stat-label">PUNKTE</div><div class="stat-value" id="scoreValue">0</div></div>
            <div class="stat-box"><div class="stat-label">ZEIT</div><div class="stat-value" id="timerValue">30.0</div></div>
        </div>
        <div class="question-area">
            <div class="equation" id="equationBlock"><div class="equation-text" id="questionText">8 + 3 = ?</div></div>
            <div class="input-area">
                <input type="number" id="answerInput" class="answer-input" placeholder="?" inputmode="numeric" autocomplete="off">
                <button id="submitBtn" class="submit-btn">✓</button>
            </div>
            <div class="action-buttons">
                <button id="resetBtn" class="btn-action">↻ NEUSTART</button>
                <button id="menuBtn" class="btn-action">🏠 MENÜ</button>
            </div>
            <div class="feedback" id="feedbackMsg">👆 Tippe die Lösung</div>
        </div>
        <div class="streak-area">
            <div class="streak-item"><div class="streak-label">🔥 SERIE</div><div class="streak-value" id="streakValue">0</div></div>
            <div class="streak-item"><div class="streak-label">🏆 BESTE</div><div class="streak-value" id="bestStreakValue">0</div></div>
        </div>
    </div>
    <footer>⚡ Richtige Antwort: +10 Punkte +0.8 Sek. | Falsch: −1.8 Sek.</footer>
</div>

<div id="readyModal" class="modal">
    <div class="modal-content">
        <h2>🎯 BIST DU BEREIT?</h2>
        <p>30 Sekunden Zeit • Schnell rechnen = mehr Punkte!</p>
        <div class="ready-buttons">
            <button id="startGameBtn" class="ready-btn">🔥 START</button>
            <button id="cancelStartBtn" class="ready-btn cancel-btn">↻ ZURÜCK</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA6iOEmuLeLKdNidLgEqISGSW2XWRHLhjQ",
        authDomain: "mathnumberrush.firebaseapp.com",
        databaseURL: "https://mathnumberrush-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "mathnumberrush",
        storageBucket: "mathnumberrush.firebasestorage.app",
        messagingSenderId: "1072751880887",
        appId: "1:1072751880887:web:b9ab1a74c6f40a6620bb32",
        measurementId: "G-3QDHYZHNCY"
    };
    if (typeof firebase !== 'undefined' && !firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.apps.length ? firebase.database() : null;
    const scoresRef = db ? db.ref('scores') : null;

    const START_TIME = 30.0, POINTS = 10, TIME_BONUS = 0.8, PENALTY = 1.8, MAX_TIME = 45.0;
    let score = 0, time = START_TIME, gameActive = false, timerInterval = null, streak = 0, bestStreak = 0, currentQuestion = { text: "", answer: 0 };
    const ops = ['+', '−', '×'];
    function random(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
    function getDifficulty() { if (score < 70) return 1; if (score < 180) return 2; if (score < 350) return 3; if (score < 550) return 4; return 5; }
    function newQuestion() {
        const difficulty = getDifficulty();
        const op = ops[Math.floor(Math.random() * ops.length)];
        let a, b, answer, minV, maxV;
        switch(difficulty) { case 1: minV=1; maxV=12; break; case 2: minV=2; maxV=18; break; case 3: minV=4; maxV=28; break; case 4: minV=8; maxV=42; break; default: minV=12; maxV=65; }
        if (op === '×') { let limit = difficulty <=2 ? 12 : 15; a=random(2,limit); b=random(2,limit); answer=a*b; }
        else if (op === '+') { a=random(minV,maxV); b=random(minV,maxV); answer=a+b; }
        else { a=random(minV,maxV); b=random(minV,maxV); if(a>=b) answer=a-b; else { let t=a; a=b; b=t; answer=a-b; } }
        let sym = op === '×' ? '×' : op;
        return { text: `${a} ${sym} ${b}`, answer: answer };
    }
    function updateUI() { document.getElementById('questionText').innerText = currentQuestion.text + " = ?"; }
    function startTimer() { if(timerInterval) clearInterval(timerInterval); timerInterval = setInterval(() => { if(!gameActive) return; if(time <= 0.01) { time=0; document.getElementById('timerValue').innerText="0.0"; endGame(); } else { time=Math.max(0, time-0.1); document.getElementById('timerValue').innerText=time.toFixed(1); } }, 100); }
    function endGame() {
        gameActive=false; if(timerInterval) clearInterval(timerInterval);
        document.getElementById('answerInput').disabled=true; document.getElementById('submitBtn').disabled=true;
        if(score>0) {
            let playerName = prompt(`🎉 GESCHAFFT! ${score} Punkte!\nGib deinen Namen für die Bestenliste ein:`, "Spieler");
            if(playerName && playerName.trim() && scoresRef) { scoresRef.push({ name: playerName.trim().substring(0,20), score: score, timestamp: Date.now() }); }
        }
        document.getElementById('feedbackMsg').innerHTML = "⏰ SPIEL BEENDET! Drücke NEUSTART";
    }
    function correctAnswer() {
        score += POINTS; document.getElementById('scoreValue').innerText = score;
        streak++; document.getElementById('streakValue').innerText = streak;
        if(streak > bestStreak) { bestStreak = streak; document.getElementById('bestStreakValue').innerText = bestStreak; }
        time = Math.min(time + TIME_BONUS, MAX_TIME); document.getElementById('timerValue').innerText = time.toFixed(1);
        document.getElementById('feedbackMsg').innerHTML = "✓ RICHTIG! +10 Punkte +⏱️";
        document.getElementById('equationBlock').classList.add('correct-animation');
        setTimeout(() => document.getElementById('equationBlock').classList.remove('correct-animation'), 250);
        currentQuestion = newQuestion(); updateUI(); document.getElementById('answerInput').value = ''; document.getElementById('answerInput').focus();
        setTimeout(() => { if(gameActive) { document.getElementById('feedbackMsg').innerHTML = "⚡ Weiter so!"; } }, 800);
    }
    function wrongAnswer() {
        streak=0; document.getElementById('streakValue').innerText = streak;
        time = Math.max(0, time - PENALTY); document.getElementById('timerValue').innerText = time.toFixed(1);
        if(time <= 0.01) { endGame(); return; }
        document.getElementById('feedbackMsg').innerHTML = `❌ Lösung: ${currentQuestion.answer}  -${PENALTY}s`;
        document.getElementById('equationBlock').classList.add('wrong-animation');
        setTimeout(() => document.getElementById('equationBlock').classList.remove('wrong-animation'), 250);
        currentQuestion = newQuestion(); updateUI(); document.getElementById('answerInput').value = ''; document.getElementById('answerInput').focus();
        setTimeout(() => { if(gameActive) { document.getElementById('feedbackMsg').innerHTML = "💪 Nächste Aufgabe!"; } }, 1200);
    }
    function checkAnswer() { if(!gameActive) return; let raw = document.getElementById('answerInput').value.trim(); if(raw==="") return; let num=Number(raw); if(isNaN(num)) { document.getElementById('answerInput').value=''; return; } if(num===currentQuestion.answer) correctAnswer(); else wrongAnswer(); }
    function startGame() { gameActive=true; score=0; time=START_TIME; streak=0; document.getElementById('scoreValue').innerText="0"; document.getElementById('timerValue').innerText=time.toFixed(1); document.getElementById('streakValue').innerText="0"; document.getElementById('answerInput').disabled=false; document.getElementById('submitBtn').disabled=false; document.getElementById('answerInput').value=''; currentQuestion=newQuestion(); updateUI(); startTimer(); document.getElementById('feedbackMsg').innerHTML="🚀 Los geht's! Schnell rechnen!"; document.getElementById('answerInput').focus(); }
    function resetToMenu() { if(timerInterval) clearInterval(timerInterval); window.location.href = 'index.html'; }
    function resetGame() { if(timerInterval) clearInterval(timerInterval); startGame(); }
    document.getElementById('startGameBtn').addEventListener('click', () => { document.getElementById('readyModal').style.display = 'none'; startGame(); });
    document.getElementById('cancelStartBtn').addEventListener('click', resetToMenu);
    document.getElementById('submitBtn').addEventListener('click', checkAnswer);
    document.getElementById('resetBtn').addEventListener('click', resetGame);
    document.getElementById('menuBtn').addEventListener('click', resetToMenu);
    document.getElementById('answerInput').addEventListener('keypress', (e) => { if(e.key==='Enter' && gameActive) checkAnswer(); });
    document.getElementById('readyModal').style.display = 'flex';
    document.getElementById('answerInput').disabled = true; document.getElementById('submitBtn').disabled = true;
</script>
</body>
</html>
