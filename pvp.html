<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Number Rush • PvP-Modus</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(135deg, #0f2f3a 0%, #1a4d5e 100%); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { max-width: 600px; width: 100%; }
        .card { background: white; border-radius: 48px; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.35); }
        .stats { background: linear-gradient(135deg, #1e3e4a, #153b46); padding: 20px 24px; display: flex; justify-content: space-between; }
        .stat-box { background: rgba(0,0,0,0.3); border-radius: 60px; padding: 6px 20px; text-align: center; }
        .stat-label { font-size: 0.65rem; text-transform: uppercase; color: #b9dfed; }
        .stat-value { font-size: 1.8rem; font-weight: 800; color: #ffdd99; }
        .opponent-area { background: #f8f9fc; padding: 16px 24px; display: flex; justify-content: space-between; border-bottom: 1px solid #eef2f5; }
        .opponent-info { display: flex; align-items: center; gap: 12px; }
        .vs-badge { background: #e67e22; color: white; padding: 4px 12px; border-radius: 40px; font-size: 0.7rem; font-weight: 600; }
        .opponent-name { font-weight: 700; color: #2c6b7c; }
        .opponent-score-box { background: #e9ecef; padding: 6px 16px; border-radius: 40px; }
        .opponent-score-value { font-weight: 800; color: #e67e22; font-size: 1.2rem; }
        .question-area { padding: 32px 24px 24px; background: white; }
        .equation { background: #f8f9fc; border-radius: 48px; padding: 28px 20px; text-align: center; border: 1px solid #eef2f5; }
        .equation-text { font-size: 2.8rem; font-weight: 800; font-family: monospace; color: #2c6b7c; letter-spacing: 3px; }
        .input-area { display: flex; gap: 12px; margin: 24px 0; }
        .answer-input { flex: 1; background: white; border: 2px solid #e2e8f0; border-radius: 60px; font-size: 1.6rem; padding: 14px 20px; text-align: center; font-weight: 600; font-family: monospace; outline: none; }
        .answer-input:focus { border-color: #f5a623; box-shadow: 0 0 0 3px rgba(245,166,35,0.2); }
        .submit-btn { background: #f5a623; border: none; border-radius: 60px; padding: 14px 28px; font-size: 1.1rem; font-weight: 700; color: white; cursor: pointer; box-shadow: 0 5px 0 #b4621a; transform: translateY(-2px); }
        .submit-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #b4621a; }
        .action-buttons { display: flex; gap: 12px; margin-bottom: 20px; }
        .btn-action { flex: 1; background: #e9ecef; border: none; border-radius: 60px; padding: 12px; font-size: 0.9rem; font-weight: 600; color: #4a6f7c; cursor: pointer; }
        .feedback { background: #f8f9fc; border-radius: 40px; padding: 12px 20px; text-align: center; font-size: 0.85rem; color: #5a7e8c; margin-bottom: 16px; }
        .waiting-area { padding: 60px 32px; text-align: center; background: white; }
        .spinner { width: 50px; height: 50px; border: 4px solid #eef2f5; border-top-color: #f5a623; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .waiting-text { font-size: 1.1rem; color: #2c6b7c; margin-bottom: 8px; }
        .waiting-sub { color: #8ba0aa; font-size: 0.85rem; }
        .modal { display: flex; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; border-radius: 48px; padding: 40px 32px; max-width: 400px; width: 90%; text-align: center; }
        .modal-content h2 { font-size: 1.8rem; color: #1a4d5e; margin-bottom: 16px; }
        .modal-content input { width: 100%; padding: 14px; border: 2px solid #e2e8f0; border-radius: 60px; text-align: center; font-size: 1rem; margin: 20px 0; outline: none; }
        .modal-content input:focus { border-color: #f5a623; }
        .modal-buttons { display: flex; gap: 12px; flex-direction: column; }
        .modal-btn { padding: 14px; border-radius: 60px; font-size: 1rem; font-weight: 600; border: none; cursor: pointer; }
        .modal-btn-primary { background: #f5a623; color: white; box-shadow: 0 4px 0 #b4621a; transform: translateY(-2px); }
        .modal-btn-primary:active { transform: translateY(2px); }
        .modal-btn-secondary { background: #e9ecef; color: #2c6b7c; }
        .room-list { max-height: 300px; overflow-y: auto; margin: 16px 0; }
        .room-item { background: #f8f9fc; padding: 12px; border-radius: 24px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border: 1px solid #eef2f5; }
        .room-item:hover { background: #eef2f5; }
        .room-code { font-family: monospace; font-weight: bold; font-size: 1.1rem; }
        .room-player { color: #e67e22; font-size: 0.8rem; }
        .streak-area { display: flex; justify-content: center; gap: 32px; padding: 16px 24px; border-top: 1px solid #eef2f5; background: white; }
        .streak-value { font-size: 1.3rem; font-weight: 800; color: #f5a623; }
        @keyframes correctFlash { 0% { background: #f8f9fc; } 50% { background: #d4edda; } 100% { background: #f8f9fc; } }
        @keyframes wrongShake { 0%,100% { transform: translateX(0); background: #f8f9fc; } 25% { transform: translateX(4px); background: #ffe0e0; } 75% { transform: translateX(-4px); background: #ffe0e0; } }
        .correct-animation { animation: correctFlash 0.25s ease; }
        .wrong-animation { animation: wrongShake 0.25s ease; }
        footer { text-align: center; font-size: 0.7rem; color: rgba(255,255,255,0.5); margin-top: 16px; }
        .refresh-btn { background: none; border: 1px solid #e2e8f0; padding: 6px 12px; border-radius: 40px; font-size: 0.8rem; cursor: pointer; margin-top: 8px; }
    </style>
</head>
<body>
<div class="container">
    <!-- Hauptmenü -->
    <div id="mainMenu" class="modal" style="display: flex;">
        <div class="modal-content">
            <h2>⚔️ PVP-DUELL</h2>
            <p>Gib deinen Namen ein</p>
            <input type="text" id="playerNameInput" maxlength="20" placeholder="Dein Name" autocomplete="off">
            <div class="modal-buttons">
                <button id="createRoomBtn" class="modal-btn modal-btn-primary">🏠 RAUM ERSTELLEN</button>
                <button id="showRoomsBtn" class="modal-btn modal-btn-primary" style="background:#2c6b7c; box-shadow:0 4px 0 #15424f;">📋 RÄUME ANZEIGEN</button>
                <button id="cancelMainBtn" class="modal-btn modal-btn-secondary">🏠 ZURÜCK</button>
            </div>
        </div>
    </div>

    <!-- Raumliste Modal -->
    <div id="roomsModal" class="modal" style="display: none;">
        <div class="modal-content">
            <h2>📋 VERFÜGBARE RÄUME</h2>
            <div id="roomListContainer" class="room-list">
                <div style="text-align:center; padding:20px;">Lade Räume...</div>
            </div>
            <button id="refreshRoomsBtn" class="refresh-btn">🔄 AKTUALISIEREN</button>
            <button id="closeRoomsBtn" class="modal-btn modal-btn-secondary" style="margin-top:16px;">ZURÜCK</button>
        </div>
    </div>

    <!-- Wartebildschirm -->
    <div id="waitingScreen" class="card" style="display: none;">
        <div class="waiting-area">
            <div class="spinner"></div>
            <div class="waiting-text" id="waitingText">🔍 Warte auf Gegner...</div>
            <div class="waiting-sub" id="waitingSub">Raum-Code: <span id="waitingRoomCode">---</span></div>
            <button id="cancelWaitingBtn" class="btn-action" style="margin-top: 32px;">ABBRECHEN</button>
        </div>
    </div>

    <!-- Spielansicht -->
    <div id="gameScreen" style="display: none;">
        <div class="card">
            <div class="stats">
                <div class="stat-box"><div class="stat-label">DEINE PUNKTE</div><div class="stat-value" id="myScore">0</div></div>
                <div class="stat-box"><div class="stat-label">ZEIT</div><div class="stat-value" id="timerValue">30</div></div>
            </div>
            <div class="opponent-area">
                <div class="opponent-info"><span class="vs-badge">VS</span><span class="opponent-name" id="opponentName">Wird geladen...</span></div>
                <div class="opponent-score-box"><div class="opponent-score-value" id="opponentScore">0</div></div>
            </div>
            <div class="question-area">
                <div class="equation" id="equationBlock"><div class="equation-text" id="questionText">8 + 3 = ?</div></div>
                <div class="input-area"><input type="number" id="answerInput" class="answer-input" placeholder="?" inputmode="numeric" autocomplete="off"><button id="submitBtn" class="submit-btn">✓</button></div>
                <div class="action-buttons"><button id="exitPvpBtn" class="btn-action">🏠 MENÜ</button></div>
                <div class="feedback" id="feedbackMsg">👆 Tippe die Lösung</div>
            </div>
            <div class="streak-area"><div>🔥 SERIE <span id="streakValue" class="streak-value">0</span></div><div>🏆 BESTE <span id="bestStreakValue" class="streak-value">0</span></div></div>
        </div>
    </div>
    <footer>⚡ 30 Sekunden Duell • Wer mehr Punkte hat, gewinnt! • Kein Zeitbonus</footer>
</div>

<script>
    // Firebase Konfiguration
    const firebaseConfig = {
        apiKey: "AIzaSyA6iOEmuLeLKdNidLgEqISGSW2XWRHLhjQ",
        authDomain: "mathnumberrush.firebaseapp.com",
        databaseURL: "https://mathnumberrush-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "mathnumberrush",
        storageBucket: "mathnumberrush.firebasestorage.app",
        messagingSenderId: "1072751880887",
        appId: "1:1072751880887:web:b9ab1a74c6f40a6620bb32",
        measurementId: "G-3QDHYZHNCY"
    };
    
    if (typeof firebase !== 'undefined' && !firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
        console.log("Firebase initialisiert");
    }
    const db = firebase.apps.length ? firebase.database() : null;

    // Spielparameter - KEIN ZEITBONUS
    const START_TIME = 30;
    const POINTS = 10;
    // Kein Zeitbonus mehr!

    let score = 0, timeLeft = START_TIME, gameActive = false, timerInterval = null;
    let streak = 0, bestStreak = 0, currentQuestion = { text: "", answer: 0 };
    let playerId = null, roomId = null, opponentId = null, gameStarted = false, gameEnded = false;
    let playerName = "";
    let isRoomCreator = false;
    
    const ops = ['+', '−', '×'];
    function random(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }
    function getDifficulty(){ if(score<70)return 1; if(score<180)return 2; if(score<350)return 3; if(score<550)return 4; return 5; }
    
    function newQuestion(){
        const d=getDifficulty(); const op=ops[Math.floor(Math.random()*ops.length)]; let a,b,answer,minV,maxV;
        switch(d){ case 1:minV=1;maxV=12;break; case 2:minV=2;maxV=18;break; case 3:minV=4;maxV=28;break; case 4:minV=8;maxV=42;break; default:minV=12;maxV=65; }
        if(op==='×'){ let l=d<=2?12:15; a=random(2,l); b=random(2,l); answer=a*b; }
        else if(op==='+'){ a=random(minV,maxV); b=random(minV,maxV); answer=a+b; }
        else{ a=random(minV,maxV); b=random(minV,maxV); if(a>=b)answer=a-b; else{ let t=a; a=b; b=t; answer=a-b; } }
        let sym=op==='×'?'×':op; return { text:`${a} ${sym} ${b}`, answer:answer };
    }
    
    function updateUI(){ document.getElementById('questionText').innerText = currentQuestion.text + " = ?"; }
    
    function startTimer(){
        if(timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if(!gameActive) return;
            if(timeLeft <= 0){
                timeLeft = 0;
                document.getElementById('timerValue').innerText = "0";
                endGame();
            } else {
                timeLeft--;
                document.getElementById('timerValue').innerText = timeLeft;
            }
        }, 1000);
    }
    
    async function endGame(){
        if(gameEnded) return;
        gameEnded = true;
        gameActive = false;
        if(timerInterval) clearInterval(timerInterval);
        document.getElementById('answerInput').disabled = true;
        document.getElementById('submitBtn').disabled = true;
        
        if(roomId && playerId && db){
            await db.ref(`pvp_rooms/${roomId}/players/${playerId}/finished`).set(true);
            await db.ref(`pvp_rooms/${roomId}/players/${playerId}/finalScore`).set(score);
            
            const roomSnap = await db.ref(`pvp_rooms/${roomId}`).once('value');
            const room = roomSnap.val();
            if(room && room.players){
                const players = room.players;
                const playerIds = Object.keys(players);
                if(playerIds.length >= 2 && players[playerIds[0]]?.finished && players[playerIds[1]]?.finished){
                    const p1s = players[playerIds[0]].finalScore || 0;
                    const p2s = players[playerIds[1]].finalScore || 0;
                    const isPlayer1 = playerId === playerIds[0];
                    const myFinal = isPlayer1 ? p1s : p2s;
                    const oppFinal = isPlayer1 ? p2s : p1s;
                    if(myFinal > oppFinal) document.getElementById('feedbackMsg').innerHTML = "🏆 DU HAST GEWONNEN! 🏆";
                    else if(myFinal < oppFinal) document.getElementById('feedbackMsg').innerHTML = "😔 DU HAST VERLOREN! 😔";
                    else document.getElementById('feedbackMsg').innerHTML = "🤝 UNENTSCHIEDEN! 🤝";
                    document.getElementById('feedbackMsg').style.background = "#fff3e0";
                    await db.ref(`pvp_rooms/${roomId}`).remove();
                } else {
                    document.getElementById('feedbackMsg').innerHTML = "⏳ Warte auf Gegner...";
                }
            }
        }
    }
    
    function correctAnswer(){
        score += POINTS;
        document.getElementById('myScore').innerText = score;
        streak++;
        document.getElementById('streakValue').innerText = streak;
        if(streak > bestStreak){ bestStreak = streak; document.getElementById('bestStreakValue').innerText = bestStreak; }
        // KEIN ZEITBONUS mehr!
        document.getElementById('feedbackMsg').innerHTML = "✓ RICHTIG! +10 Punkte";
        document.getElementById('feedbackMsg').style.background = "#e8f5e9";
        document.getElementById('equationBlock').classList.add('correct-animation');
        setTimeout(() => document.getElementById('equationBlock').classList.remove('correct-animation'), 250);
        if(roomId && playerId && db && gameStarted) db.ref(`pvp_rooms/${roomId}/players/${playerId}/score`).set(score);
        currentQuestion = newQuestion();
        updateUI();
        document.getElementById('answerInput').value = '';
        document.getElementById('answerInput').focus();
        setTimeout(() => { if(gameActive) document.getElementById('feedbackMsg').innerHTML = "⚡ Weiter so!"; document.getElementById('feedbackMsg').style.background = "#f8f9fc"; }, 800);
    }
    
    function wrongAnswer(){
        streak = 0;
        document.getElementById('streakValue').innerText = streak;
        // KEINE ZEITSTRAFE mehr im PvP!
        document.getElementById('feedbackMsg').innerHTML = `❌ Falsch! Richtige Lösung: ${currentQuestion.answer}`;
        document.getElementById('feedbackMsg').style.background = "#ffebee";
        document.getElementById('equationBlock').classList.add('wrong-animation');
        setTimeout(() => document.getElementById('equationBlock').classList.remove('wrong-animation'), 250);
        currentQuestion = newQuestion();
        updateUI();
        document.getElementById('answerInput').value = '';
        document.getElementById('answerInput').focus();
        setTimeout(() => { if(gameActive) { document.getElementById('feedbackMsg').innerHTML = "💪 Nächste Aufgabe!"; document.getElementById('feedbackMsg').style.background = "#f8f9fc"; } }, 1200);
    }
    
    function checkAnswer(){
        if(!gameActive) return;
        let raw = document.getElementById('answerInput').value.trim();
        if(raw === "") return;
        let num = Number(raw);
        if(isNaN(num)){ document.getElementById('answerInput').value = ''; return; }
        if(num === currentQuestion.answer) correctAnswer();
        else wrongAnswer();
    }
    
    // Raum erstellen
    async function createRoom(){
        playerId = Date.now().toString() + Math.random().toString(36).substr(2,6);
        roomId = Math.random().toString(36).substring(2, 8).toUpperCase();
        isRoomCreator = true;
        
        await db.ref(`pvp_rooms/${roomId}`).set({
            createdAt: Date.now(),
            creator: playerId,
            players: {
                [playerId]: {
                    name: playerName,
                    score: 0,
                    finished: false,
                    finalScore: 0
                }
            }
        });
        
        document.getElementById('waitingRoomCode').innerText = roomId;
        document.getElementById('waitingText').innerHTML = "🔍 Warte auf Gegner...";
        document.getElementById('waitingSub').innerHTML = `Raum-Code: <strong>${roomId}</strong><br>Teile diesen Code mit deinem Freund!`;
        
        document.getElementById('mainMenu').style.display = 'none';
        document.getElementById('roomsModal').style.display = 'none';
        document.getElementById('waitingScreen').style.display = 'block';
        
        // Auf Gegner warten
        const roomRef = db.ref(`pvp_rooms/${roomId}/players`);
        roomRef.on('value', (snapshot) => {
            const players = snapshot.val();
            if(players && Object.keys(players).length === 2 && !gameStarted){
                startPvPGame(players);
            }
        });
        
        // Raum nach 5 Minuten löschen wenn kein Gegner kommt
        setTimeout(() => {
            if(!gameStarted && roomId) db.ref(`pvp_rooms/${roomId}`).remove();
        }, 300000);
    }
    
    // Raum beitreten
    async function joinRoom(roomCode){
        playerId = Date.now().toString() + Math.random().toString(36).substr(2,6);
        roomId = roomCode.toUpperCase();
        isRoomCreator = false;
        
        const roomRef = db.ref(`pvp_rooms/${roomId}`);
        const roomSnap = await roomRef.once('value');
        const room = roomSnap.val();
        
        if(!room){
            alert("Raum nicht gefunden! Überprüfe den Code.");
            return false;
        }
        
        if(room.players && Object.keys(room.players).length >= 2){
            alert("Dieser Raum ist bereits voll!");
            return false;
        }
        
        await roomRef.child(`players/${playerId}`).set({
            name: playerName,
            score: 0,
            finished: false,
            finalScore: 0
        });
        
        document.getElementById('waitingRoomCode').innerText = roomId;
        document.getElementById('waitingText').innerHTML = "🔍 Verbinde mit Raum...";
        document.getElementById('waitingSub').innerHTML = `Raum-Code: <strong>${roomId}</strong>`;
        
        document.getElementById('mainMenu').style.display = 'none';
        document.getElementById('roomsModal').style.display = 'none';
        document.getElementById('waitingScreen').style.display = 'block';
        
        // Auf Spielstart warten
        const playersRef = db.ref(`pvp_rooms/${roomId}/players`);
        playersRef.on('value', (snapshot) => {
            const players = snapshot.val();
            if(players && Object.keys(players).length === 2 && !gameStarted){
                startPvPGame(players);
            }
        });
        
        return true;
    }
    
    function startPvPGame(players){
        gameStarted = true;
        const playerIds = Object.keys(players);
        opponentId = playerIds.find(id => id !== playerId);
        const opponent = players[opponentId];
        
        document.getElementById('opponentName').innerHTML = opponent.name;
        document.getElementById('opponentScore').innerHTML = "0";
        
        // Gegner Score live verfolgen
        db.ref(`pvp_rooms/${roomId}/players/${opponentId}/score`).on('value', (snap) => {
            const oppScore = snap.val() || 0;
            document.getElementById('opponentScore').innerHTML = oppScore;
        });
        
        // Gegner finished status
        db.ref(`pvp_rooms/${roomId}/players/${opponentId}/finished`).on('value', (snap) => {
            if(snap.val() === true && !gameEnded) endGame();
        });
        
        document.getElementById('waitingScreen').style.display = 'none';
        document.getElementById('gameScreen').style.display = 'block';
        
        // Spiel starten
        gameActive = true;
        score = 0;
        timeLeft = START_TIME;
        streak = 0;
        bestStreak = 0;
        document.getElementById('myScore').innerText = "0";
        document.getElementById('timerValue').innerText = timeLeft;
        document.getElementById('streakValue').innerText = "0";
        document.getElementById('bestStreakValue').innerText = "0";
        document.getElementById('answerInput').disabled = false;
        document.getElementById('submitBtn').disabled = false;
        document.getElementById('answerInput').value = '';
        currentQuestion = newQuestion();
        updateUI();
        startTimer();
        document.getElementById('feedbackMsg').innerHTML = "⚔️ KAMPF BEGINNT! 30 Sekunden!";
        document.getElementById('feedbackMsg').style.background = "#f8f9fc";
        document.getElementById('answerInput').focus();
    }
    
    // Raumliste laden
    function loadRooms(){
        if(!db) return;
        db.ref('pvp_rooms').once('value', (snapshot) => {
            const rooms = snapshot.val();
            const container = document.getElementById('roomListContainer');
            if(!rooms || Object.keys(rooms).length === 0){
                container.innerHTML = '<div style="text-align:center; padding:20px;">Keine aktiven Räume gefunden.<br>Erstelle einen neuen Raum!</div>';
                return;
            }
            
            let html = '';
            for(let [code, room] of Object.entries(rooms)){
                const playerCount = room.players ? Object.keys(room.players).length : 0;
                if(playerCount < 2){
                    html += `
                        <div class="room-item" onclick="joinRoomFromList('${code}')">
                            <div>
                                <div class="room-code">📌 ${code}</div>
                                <div class="room-player">${playerCount}/2 Spieler</div>
                            </div>
                            <button style="background:#f5a623; border:none; padding:8px 16px; border-radius:40px; color:white; cursor:pointer;">BEITRETEN</button>
                        </div>
                    `;
                }
            }
            
            if(html === ''){
                container.innerHTML = '<div style="text-align:center; padding:20px;">Keine verfügbaren Räume.<br>Erstelle einen neuen Raum!</div>';
            } else {
                container.innerHTML = html;
            }
        });
    }
    
    window.joinRoomFromList = async function(roomCode){
        playerName = document.getElementById('playerNameInput').value.trim();
        if(!playerName){
            alert("Bitte gib zuerst deinen Namen ein!");
            document.getElementById('roomsModal').style.display = 'none';
            document.getElementById('mainMenu').style.display = 'flex';
            return;
        }
        await joinRoom(roomCode);
    };
    
    async function cancelMatchmaking(){
        if(roomId && playerId && db){
            await db.ref(`pvp_rooms/${roomId}/players/${playerId}`).remove();
            const remaining = await db.ref(`pvp_rooms/${roomId}/players`).once('value');
            if(!remaining.exists()) await db.ref(`pvp_rooms/${roomId}`).remove();
        }
        window.location.href = 'index.html';
    }
    
    function exitToMenu(){
        if(timerInterval) clearInterval(timerInterval);
        if(roomId && playerId && db && !gameEnded) cancelMatchmaking();
        else window.location.href = 'index.html';
    }
    
    // Event Listener
    document.getElementById('createRoomBtn').addEventListener('click', () => {
        playerName = document.getElementById('playerNameInput').value.trim();
        if(!playerName){ alert("Bitte Namen eingeben"); return; }
        createRoom();
    });
    
    document.getElementById('showRoomsBtn').addEventListener('click', () => {
        playerName = document.getElementById('playerNameInput').value.trim();
        if(!playerName){ alert("Bitte zuerst Namen eingeben"); return; }
        loadRooms();
        document.getElementById('mainMenu').style.display = 'none';
        document.getElementById('roomsModal').style.display = 'flex';
    });
    
    document.getElementById('refreshRoomsBtn').addEventListener('click', loadRooms);
    document.getElementById('closeRoomsBtn').addEventListener('click', () => {
        document.getElementById('roomsModal').style.display = 'none';
        document.getElementById('mainMenu').style.display = 'flex';
    });
    
    document.getElementById('cancelMainBtn').addEventListener('click', () => {
        window.location.href = 'index.html';
    });
    
    document.getElementById('cancelWaitingBtn').addEventListener('click', cancelMatchmaking);
    document.getElementById('submitBtn').addEventListener('click', checkAnswer);
    document.getElementById('exitPvpBtn').addEventListener('click', exitToMenu);
    document.getElementById('answerInput').addEventListener('keypress', (e) => {
        if(e.key === 'Enter' && gameActive) checkAnswer();
    });
</script>
</body>
</html>
